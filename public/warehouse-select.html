<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Filial Tanlash - Ombor</title>
    <link rel="stylesheet" href="mobile-responsive.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      top: -250px;
      right: -250px;
      animation: float 6s ease-in-out infinite;
    }
    
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      bottom: -200px;
      left: -200px;
      animation: float 8s ease-in-out infinite reverse;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    
    .container {
      max-width: 1200px;
      width: 100%;
      position: relative;
      z-index: 1;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease;
    }
    
    .header h1 {
      color: white;
      font-size: 2.5em;
      font-weight: 700;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    
    .header p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.1em;
    }
    
    .branches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }
    
    .branch-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.6s ease backwards;
    }
    
    .branch-card:nth-child(1) { animation-delay: 0.1s; }
    .branch-card:nth-child(2) { animation-delay: 0.2s; }
    .branch-card:nth-child(3) { animation-delay: 0.3s; }
    .branch-card:nth-child(4) { animation-delay: 0.4s; }
    
    .branch-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    
    .branch-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }
    
    .branch-card:hover::before {
      transform: scaleX(1);
    }
    
    .branch-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2em;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }
    
    .branch-name {
      font-size: 1.5em;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 10px;
    }
    
    .branch-info {
      color: #718096;
      font-size: 0.95em;
      margin: 8px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .branch-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-value {
      font-size: 1.5em;
      font-weight: 700;
      color: #667eea;
      display: block;
    }
    
    .stat-label {
      font-size: 0.85em;
      color: #a0aec0;
      margin-top: 5px;
    }
    
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: white;
      color: #667eea;
      padding: 15px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      animation: fadeInUp 0.6s ease 0.5s backwards;
    }
    
    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }
    
    .loading {
      text-align: center;
      color: white;
      font-size: 1.2em;
      padding: 40px;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .empty-state {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      animation: fadeInUp 0.6s ease;
    }
    
    .empty-state-icon {
      font-size: 4em;
      margin-bottom: 20px;
    }
    
    .empty-state h3 {
      color: #2d3748;
      font-size: 1.5em;
      margin-bottom: 10px;
    }
    
    .empty-state p {
      color: #718096;
      font-size: 1.1em;
    }
    
    @media (max-width: 768px) {
      .header h1 {
        font-size: 2em;
      }
      
      .branches-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <script src="back-button.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏢 Filial Tanlash</h1>
      <p>Qaysi filial omboriga kirmoqchisiz?</p>
    </div>
    
    <div id="branchesContainer">
      <div class="loading">
        <div class="spinner"></div>
        <p>Filiallar yuklanmoqda...</p>
      </div>
    </div>
    
    <div style="text-align: center; margin-top: 30px;">
      <a href="/admin.html" class="back-btn">
        <span>←</span>
        <span>Orqaga</span>
      </a>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin + '/api';
    
    async function init() {
      // Admin tekshiruvi
      if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = '/login.html';
        return;
      }
      
      await loadBranches();
    }
    
    async function loadBranches() {
      try {
        const response = await fetch(`${API_URL}/branches`);
        const data = await response.json();
        
        if (!data.success) {
          throw new Error(data.error || 'Filiallar yuklashda xatolik');
        }
        
        const branches = data.branches || [];
        displayBranches(branches);
        
        // Har bir filial uchun statistika yuklash
        branches.forEach(branch => loadBranchStats(branch.branchId));
        
      } catch (error) {
        console.error('❌ Filiallar yuklash xatosi:', error);
        document.getElementById('branchesContainer').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">❌</div>
            <h3>Xatolik yuz berdi</h3>
            <p>${error.message}</p>
          </div>
        `;
      }
    }
    
    function displayBranches(branches) {
      const container = document.getElementById('branchesContainer');
      
      if (!branches || branches.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🏢</div>
            <h3>Filiallar topilmadi</h3>
            <p>Hozircha faol filiallar yo'q</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = `
        <div class="branches-grid">
          ${branches.map(branch => `
            <div class="branch-card" onclick="selectBranch(${branch.branchId}, '${branch.name}')">
              <div class="branch-icon">🏢</div>
              <div class="branch-name">${branch.name}</div>
              ${branch.address ? `<div class="branch-info">📍 ${branch.address}</div>` : ''}
              ${branch.phone ? `<div class="branch-info">📱 ${branch.phone}</div>` : ''}
              ${branch.manager ? `<div class="branch-info">👤 ${branch.manager}</div>` : ''}
              
              <div class="branch-stats">
                <div class="stat">
                  <span class="stat-value" id="branch-${branch.branchId}-products">-</span>
                  <span class="stat-label">Mahsulotlar</span>
                </div>
                <div class="stat">
                  <span class="stat-value" id="branch-${branch.branchId}-items">-</span>
                  <span class="stat-label">IMEI kodlar</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }
    
    async function loadBranchStats(branchId) {
      try {
        const response = await fetch(`${API_URL}/branches/${branchId}/stats`);
        const data = await response.json();
        
        if (data.success) {
          const productsEl = document.getElementById(`branch-${branchId}-products`);
          const itemsEl = document.getElementById(`branch-${branchId}-items`);
          
          if (productsEl) productsEl.textContent = data.stats.totalProducts || 0;
          if (itemsEl) itemsEl.textContent = data.stats.totalItems || 0;
        }
      } catch (error) {
        console.error(`❌ Filial ${branchId} statistika xatosi:`, error);
      }
    }
    
    function selectBranch(branchId, branchName) {
      // Tanlangan filialni saqlash
      localStorage.setItem('selectedBranchId', branchId);
      localStorage.setItem('selectedBranchName', branchName);
      
      // Ombor sahifasiga o'tish
      window.location.href = `/warehouse.html?branchId=${branchId}`;
    }
    
    document.addEventListener('DOMContentLoaded', init);
  </script>
    <script src="mobile-enhancements.js"></script>
</body>
</html>
