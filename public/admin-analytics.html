<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📊 Analytics Dashboard</title>
    <link rel="stylesheet" href="mobile-responsive.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 50%, #6d28d9 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(167, 139, 250, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      max-width: 1600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    
    .header {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.2);
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      color: #6d28d9;
      font-size: 2em;
      font-weight: 800;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.15);
      text-align: center;
      transition: all 0.3s;
    }
    
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 48px rgba(139, 92, 246, 0.22);
    }
    
    .stat-number {
      font-size: 2.5em;
      font-weight: bold;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    
    .stat-label {
      color: #6b7280;
      font-size: 1.1em;
      font-weight: 600;
    }
    
    .stat-change {
      font-size: 0.9em;
      margin-top: 8px;
    }
    
    .stat-change.positive {
      color: #10b981;
    }
    
    .stat-change.negative {
      color: #ef4444;
    }
    
    .chart-section {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.15);
      margin-bottom: 20px;
    }
    
    .chart-section h3 {
      color: #6d28d9;
      margin-bottom: 20px;
      font-size: 1.3em;
      font-weight: 800;
    }
    
    .chart-container {
      position: relative;
      height: 350px;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.95em;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s;
      margin: 5px;
      font-weight: 600;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }
    
    .btn-success {
      background: linear-gradient(135deg, #10b981, #047857);
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    
    .filter-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .filter-tab {
      padding: 10px 20px;
      background: #f3f4f6;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .filter-tab.active {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
    }
    
    .top-list {
      display: grid;
      gap: 12px;
    }
    
    .top-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: #f9fafb;
      border-radius: 12px;
      transition: all 0.2s;
    }
    
    .top-item:hover {
      background: white;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.1);
    }
    
    .top-rank {
      font-size: 1.5em;
      font-weight: 800;
      color: #8b5cf6;
      width: 40px;
    }
    
    .top-info {
      flex: 1;
      margin-left: 16px;
    }
    
    .top-name {
      font-weight: 600;
      color: #374151;
    }
    
    .top-details {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }
    
    .top-value {
      font-size: 1.2em;
      font-weight: 700;
      color: #8b5cf6;
    }
  </style>
  <script src="back-button.js"></script>

  <!-- 📱 Mobile Responsive CSS -->
  <link rel="stylesheet" href="mobile-universal.css">
  <link rel="stylesheet" href="mobile-admin-dashboard.css">
  <script src="mobile-enhancements.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Analytics Dashboard</h1>
      <div>
        <a href="/admin.html" class="btn btn-success">← Orqaga</a>
        <button class="btn btn-primary" onclick="loadAllData()">🔄 Yangilash</button>
      </div>
    </div>
    
    <!-- Key Metrics -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalRevenue">$0</div>
        <div class="stat-label">Jami Daromad</div>
        <div class="stat-change positive" id="revenueChange">+0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalSales">0</div>
        <div class="stat-label">Jami Savdolar</div>
        <div class="stat-change positive" id="salesChange">+0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="avgOrderValue">$0</div>
        <div class="stat-label">O'rtacha Savdo</div>
        <div class="stat-change positive" id="avgChange">+0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalProfit">$0</div>
        <div class="stat-label">Jami Foyda</div>
        <div class="stat-change positive" id="profitChange">+0%</div>
      </div>
    </div>
    
    <!-- Time Period Filter -->
    <div class="chart-section">
      <div class="filter-tabs">
        <button class="filter-tab" onclick="changePeriod('today')">Bugun</button>
        <button class="filter-tab active" onclick="changePeriod('week')">Hafta</button>
        <button class="filter-tab" onclick="changePeriod('month')">Oy</button>
        <button class="filter-tab" onclick="changePeriod('year')">Yil</button>
      </div>
    </div>
    
    <!-- Sales Chart -->
    <div class="chart-section">
      <h3>📈 Savdolar Dinamikasi</h3>
      <div class="chart-container">
        <canvas id="salesChart"></canvas>
      </div>
    </div>
    
    <!-- Revenue vs Profit Chart -->
    <div class="chart-section">
      <h3>💰 Daromad va Foyda</h3>
      <div class="chart-container">
        <canvas id="revenueProfitChart"></canvas>
      </div>
    </div>
    
    <!-- Top Products and Cashiers -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px;">
      <!-- Top Products -->
      <div class="chart-section">
        <h3>🏆 TOP-10 Mahsulotlar</h3>
        <div class="top-list" id="topProducts">
          <p style="color: #6b7280; text-align: center;">Yuklanmoqda...</p>
        </div>
      </div>
      
      <!-- Top Cashiers -->
      <div class="chart-section">
        <h3>👑 TOP-10 Kassirlar</h3>
        <div class="top-list" id="topCashiers">
          <p style="color: #6b7280; text-align: center;">Yuklanmoqda...</p>
        </div>
      </div>
    </div>
    
    <!-- Category Distribution -->
    <div class="chart-section">
      <h3>📊 Kategoriyalar bo'yicha Taqsimot</h3>
      <div class="chart-container">
        <canvas id="categoryChart"></canvas>
      </div>
    </div>
    
    <!-- Branch Performance -->
    <div class="chart-section">
      <h3>🏢 Filiallar Performance</h3>
      <div class="chart-container">
        <canvas id="branchChart"></canvas>
      </div>
    </div>
  </div>
  
  <script>
    let currentPeriod = 'week';
    let salesChart, revenueProfitChart, categoryChart, branchChart;
    
    // Change period
    function changePeriod(period) {
      currentPeriod = period;
      document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      loadAllData();
    }
    
    // Load all data
    async function loadAllData() {
      await Promise.all([
        loadKeyMetrics(),
        loadSalesChart(),
        loadRevenueProfitChart(),
        loadTopProducts(),
        loadTopCashiers(),
        loadCategoryChart(),
        loadBranchChart()
      ]);
    }
    
    // Load key metrics
    async function loadKeyMetrics() {
      try {
        const response = await fetch(`/api/analytics/metrics?period=${currentPeriod}`);
        const data = await response.json();
        
        if (data.success) {
          const m = data.metrics;
          document.getElementById('totalRevenue').textContent = '$' + m.totalRevenue.toLocaleString('en-US', {minimumFractionDigits: 2});
          document.getElementById('totalSales').textContent = m.totalSales;
          document.getElementById('avgOrderValue').textContent = '$' + m.avgOrderValue.toLocaleString('en-US', {minimumFractionDigits: 2});
          document.getElementById('totalProfit').textContent = '$' + m.totalProfit.toLocaleString('en-US', {minimumFractionDigits: 2});
          
          // Changes
          setChange('revenueChange', m.revenueChange);
          setChange('salesChange', m.salesChange);
          setChange('avgChange', m.avgChange);
          setChange('profitChange', m.profitChange);
        }
      } catch (error) {
        console.error('Metrics yuklash xato:', error);
      }
    }
    
    // Set change indicator
    function setChange(elementId, value) {
      const element = document.getElementById(elementId);
      element.textContent = (value >= 0 ? '+' : '') + value.toFixed(1) + '%';
      element.className = 'stat-change ' + (value >= 0 ? 'positive' : 'negative');
    }
    
    // Load sales chart
    async function loadSalesChart() {
      try {
        const response = await fetch(`/api/analytics/sales-chart?period=${currentPeriod}`);
        const data = await response.json();
        
        if (data.success) {
          const ctx = document.getElementById('salesChart').getContext('2d');
          
          if (salesChart) salesChart.destroy();
          
          salesChart = new Chart(ctx, {
            type: 'line',
            data: {
              labels: data.labels,
              datasets: [{
                label: 'Savdolar',
                data: data.values,
                borderColor: '#8b5cf6',
                backgroundColor: 'rgba(139, 92, 246, 0.1)',
                tension: 0.4,
                fill: true
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false }
              },
              scales: {
                y: { beginAtZero: true }
              }
            }
          });
        }
      } catch (error) {
        console.error('Sales chart yuklash xato:', error);
      }
    }
    
    // Load revenue profit chart
    async function loadRevenueProfitChart() {
      try {
        const response = await fetch(`/api/analytics/revenue-profit?period=${currentPeriod}`);
        const data = await response.json();
        
        if (data.success) {
          const ctx = document.getElementById('revenueProfitChart').getContext('2d');
          
          if (revenueProfitChart) revenueProfitChart.destroy();
          
          revenueProfitChart = new Chart(ctx, {
            type: 'bar',
            data: {
              labels: data.labels,
              datasets: [
                {
                  label: 'Daromad',
                  data: data.revenue,
                  backgroundColor: '#8b5cf6'
                },
                {
                  label: 'Foyda',
                  data: data.profit,
                  backgroundColor: '#10b981'
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { position: 'top' }
              },
              scales: {
                y: { beginAtZero: true }
              }
            }
          });
        }
      } catch (error) {
        console.error('Revenue profit chart yuklash xato:', error);
      }
    }
    
    // Load top products
    async function loadTopProducts() {
      try {
        const response = await fetch(`/api/analytics/top-products?period=${currentPeriod}&limit=10`);
        const data = await response.json();
        
        const container = document.getElementById('topProducts');
        
        if (data.success && data.products.length > 0) {
          container.innerHTML = data.products.map((product, index) => `
            <div class="top-item">
              <div class="top-rank">${index + 1}</div>
              <div class="top-info">
                <div class="top-name">${product.name}</div>
                <div class="top-details">${product.soldCount} ta sotildi</div>
              </div>
              <div class="top-value">$${product.totalRevenue.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<p style="color: #6b7280; text-align: center;">Ma\'lumot yo\'q</p>';
        }
      } catch (error) {
        console.error('Top products yuklash xato:', error);
      }
    }
    
    // Load top cashiers
    async function loadTopCashiers() {
      try {
        const response = await fetch(`/api/analytics/top-cashiers?period=${currentPeriod}&limit=10`);
        const data = await response.json();
        
        const container = document.getElementById('topCashiers');
        
        if (data.success && data.cashiers.length > 0) {
          container.innerHTML = data.cashiers.map((cashier, index) => `
            <div class="top-item">
              <div class="top-rank">${index + 1}</div>
              <div class="top-info">
                <div class="top-name">${cashier.name}</div>
                <div class="top-details">${cashier.salesCount} ta savdo</div>
              </div>
              <div class="top-value">$${cashier.totalRevenue.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<p style="color: #6b7280; text-align: center;">Ma\'lumot yo\'q</p>';
        }
      } catch (error) {
        console.error('Top cashiers yuklash xato:', error);
      }
    }
    
    // Load category chart
    async function loadCategoryChart() {
      try {
        const response = await fetch(`/api/analytics/categories?period=${currentPeriod}`);
        const data = await response.json();
        
        if (data.success) {
          const ctx = document.getElementById('categoryChart').getContext('2d');
          
          if (categoryChart) categoryChart.destroy();
          
          categoryChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: data.labels,
              datasets: [{
                data: data.values,
                backgroundColor: [
                  '#8b5cf6', '#10b981', '#f59e0b', '#ef4444', '#3b82f6',
                  '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16'
                ]
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { position: 'right' }
              }
            }
          });
        }
      } catch (error) {
        console.error('Category chart yuklash xato:', error);
      }
    }
    
    // Load branch chart
    async function loadBranchChart() {
      try {
        const response = await fetch(`/api/analytics/branches?period=${currentPeriod}`);
        const data = await response.json();
        
        if (data.success) {
          const ctx = document.getElementById('branchChart').getContext('2d');
          
          if (branchChart) branchChart.destroy();
          
          branchChart = new Chart(ctx, {
            type: 'bar',
            data: {
              labels: data.labels,
              datasets: [{
                label: 'Daromad',
                data: data.values,
                backgroundColor: '#8b5cf6'
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              indexAxis: 'y',
              plugins: {
                legend: { display: false }
              },
              scales: {
                x: { beginAtZero: true }
              }
            }
          });
        }
      } catch (error) {
        console.error('Branch chart yuklash xato:', error);
      }
    }
    
    // Load on page load
    document.addEventListener('DOMContentLoaded', loadAllData);
  </script>
    <script src="mobile-enhancements.js"></script>
</body>
</html>
