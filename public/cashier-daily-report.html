<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bugungi Hisobot</title>
    <link rel="stylesheet" href="mobile-responsive.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            color: #059669;
            font-size: 1.6em;
        }
        
        .header-date {
            color: #6b7280;
            font-size: 0.9em;
        }
        
        .btn-back {
            background: #6b7280;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .stat-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #059669;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #6b7280;
            font-size: 0.9em;
        }
        
        .section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .section h3 {
            color: #059669;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .sale-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #10b981;
        }
        
        .sale-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }
        
        .sale-time {
            color: #6b7280;
            font-size: 0.85em;
        }
        
        .sale-amount {
            font-size: 1.3em;
            font-weight: 700;
            color: #059669;
        }
        
        .sale-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .detail-item {
            font-size: 0.9em;
        }
        
        .detail-label {
            color: #6b7280;
        }
        
        .detail-value {
            font-weight: 600;
            color: #111827;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 1.3em;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .sale-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
  <script src="back-button.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 Bugungi Hisobot</h1>
                <p class="header-date" id="currentDate"></p>
            </div>
            <button class="btn-back" onclick="location.href='cashier-simple.html'">← Orqaga</button>
        </div>
        
        <!-- Statistika -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🛒</div>
                <div class="stat-number" id="totalSales">0</div>
                <div class="stat-label">Savdolar</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-number" id="totalRevenue">$0</div>
                <div class="stat-label">Daromad</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💵</div>
                <div class="stat-number" id="totalPaid">$0</div>
                <div class="stat-label">To'landi</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-number" id="avgSale">$0</div>
                <div class="stat-label">O'rtacha</div>
            </div>
        </div>
        
        <!-- Savdolar ro'yxati -->
        <div class="section">
            <h3>📋 Bugungi Savdolar</h3>
            <div id="salesList">
                <div class="no-data">Yuklanmoqda...</div>
            </div>
        </div>
    </div>
    
    <script>
        const cashierData = JSON.parse(localStorage.getItem('cashierData') || '{}');
        
        if (!cashierData.cashierId) {
            window.location.href = '/cashier-login.html';
        }
        
        // Bugungi sanani ko'rsatish
        const today = new Date();
        document.getElementById('currentDate').textContent = 
            today.toLocaleDateString('uz-UZ', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        
        // Hisobotni yuklash
        async function loadReport() {
            try {
                const response = await fetch(`/api/cashier-sales/${cashierData.cashierId}`);
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error('Ma\'lumot yuklanmadi');
                }
                
                const todayDate = today.toLocaleDateString('uz-UZ');
                const todaySales = data.sales.filter(s => s.date === todayDate);
                
                // Statistika
                const totalSales = todaySales.length;
                const totalRevenue = todaySales.reduce((sum, s) => sum + (s.price || 0), 0);
                const totalPaid = todaySales.reduce((sum, s) => sum + (s.totalPaidUSD || s.paid || 0), 0);
                const avgSale = totalSales > 0 ? totalRevenue / totalSales : 0;
                
                document.getElementById('totalSales').textContent = totalSales;
                document.getElementById('totalRevenue').textContent = '$' + totalRevenue.toFixed(2);
                document.getElementById('totalPaid').textContent = '$' + totalPaid.toFixed(2);
                document.getElementById('avgSale').textContent = '$' + avgSale.toFixed(2);
                
                // Savdolar ro'yxati
                const salesList = document.getElementById('salesList');
                
                if (todaySales.length === 0) {
                    salesList.innerHTML = `
                        <div class="no-data">
                            <div style="font-size: 3em; margin-bottom: 10px;">📭</div>
                            <h3>Bugun savdo yo'q</h3>
                            <p>Birinchi savdoni qo'shing!</p>
                        </div>
                    `;
                    return;
                }
                
                // Eng yangi savdolarni birinchi ko'rsatish
                todaySales.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                
                salesList.innerHTML = todaySales.map(sale => {
                    const debt = (sale.price || 0) - (sale.totalPaidUSD || sale.paid || 0);
                    
                    return `
                        <div class="sale-item">
                            <div class="sale-header">
                                <div>
                                    <div style="font-weight: 700; font-size: 1.1em; color: #111827; margin-bottom: 5px;">
                                        📦 ${sale.product}
                                    </div>
                                    <div class="sale-time">🕐 ${sale.time}</div>
                                </div>
                                <div class="sale-amount">$${(sale.totalPaidUSD || sale.paid || 0).toFixed(2)}</div>
                            </div>
                            <div class="sale-details">
                                <div class="detail-item">
                                    <span class="detail-label">Mijoz:</span>
                                    <span class="detail-value">${sale.customerName}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Narxi:</span>
                                    <span class="detail-value">$${(sale.price || 0).toFixed(2)}</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Qarz:</span>
                                    <span class="detail-value" style="color: ${debt > 0 ? '#ef4444' : '#10b981'};">
                                        $${debt.toFixed(2)}
                                    </span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Hisobot yuklash xatosi:', error);
                document.getElementById('salesList').innerHTML = `
                    <div class="no-data">
                        <div style="font-size: 3em; margin-bottom: 10px;">❌</div>
                        <h3>Xatolik yuz berdi</h3>
                        <p>Ma'lumotlarni yuklab bo'lmadi</p>
                    </div>
                `;
            }
        }
        
        // Sahifa yuklanganda
        loadReport();
    </script>
    <script src="mobile-enhancements.js"></script>
    <script src="cashier-sidebar-loader.js"></script>
</body>
</html>
