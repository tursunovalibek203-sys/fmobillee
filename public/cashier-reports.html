<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hisobotlar - Kassir</title>
    <link rel="stylesheet" href="mobile-responsive.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-professional.css">
    <style>
        body {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 50%, #4338ca 100%);
        }

        .reports-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .reports-header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .period-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .period-tab {
            flex: 1;
            padding: 16px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .period-tab:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .period-tab.active {
            background: white;
            color: #4338ca;
            border-color: white;
        }

        .report-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-box {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
        }

        .metric-label {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 900;
            color: #1e40af;
        }

        .sales-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .sale-item {
            padding: 16px;
            background: #f9fafb;
            border-radius: 12px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 12px;
            align-items: center;
        }

        .sale-item:hover {
            background: #f3f4f6;
        }

        .chart-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .period-tabs {
                flex-direction: column;
            }

            .sale-item {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }
    </style>
  <script src="back-button.js"></script>

  <!-- 📱 Mobile Responsive CSS -->
  <link rel="stylesheet" href="mobile-universal.css">
  <link rel="stylesheet" href="mobile-cashier-complete.css">
  <script src="mobile-enhancements.js"></script>
</head>
<body>
    <div class="reports-container">
        <!-- Header -->
        <div class="reports-header">
            <div>
                <h1 style="margin: 0; color: white; font-size: 32px; font-weight: 900;">📊 Hisobotlar</h1>
                <p style="margin: 8px 0 0 0; color: rgba(255,255,255,0.9);" id="cashierName"></p>
            </div>
            <button class="settings-btn" onclick="window.location.href='cashier-dashboard.html'" style="background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.3);">
                <span>←</span>
                <span>Orqaga</span>
            </button>
        </div>

        <!-- Period Tabs -->
        <div class="period-tabs">
            <div class="period-tab active" onclick="selectPeriod('today')" id="tabToday">
                📅 Bugun
            </div>
            <div class="period-tab" onclick="selectPeriod('week')" id="tabWeek">
                📆 Hafta
            </div>
            <div class="period-tab" onclick="selectPeriod('month')" id="tabMonth">
                📊 Oy
            </div>
            <div class="period-tab" onclick="selectPeriod('all')" id="tabAll">
                📈 Barchasi
            </div>
        </div>

        <!-- Metrics -->
        <div class="report-grid">
            <div class="metric-box">
                <div class="metric-label">💵 Dollar to'lovlar</div>
                <div class="metric-value" id="metricUSD">$0.00</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">💰 So'm to'lovlar</div>
                <div class="metric-value" id="metricUZS">0 so'm</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">📊 Jami (USD)</div>
                <div class="metric-value" id="metricTotal">$0.00</div>
            </div>
            <div class="metric-box">
                <div class="metric-label">🛒 Savdolar soni</div>
                <div class="metric-value" id="metricCount">0</div>
            </div>
        </div>

        <!-- Sales List -->
        <div class="report-card">
            <h2 style="margin: 0 0 20px 0;">📋 Savdolar ro'yxati</h2>
            
            <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                <input type="text" id="searchSales" placeholder="🔍 Mijoz yoki mahsulot qidirish..." 
                       style="flex: 1; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 12px;"
                       oninput="filterSales()">
                
                <select id="typeFilter" onchange="filterSales()" 
                        style="padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-weight: 600;">
                    <option value="">Barchasi</option>
                    <option value="sale">🛒 Savdolar</option>
                    <option value="payment">💰 To'lovlar</option>
                </select>
            </div>

            <div class="sales-list" id="salesList">
                <div style="padding: 40px; text-align: center; color: #6b7280;">
                    Yuklanmoqda...
                </div>
            </div>
        </div>

        <!-- Summary -->
        <div class="report-card">
            <h2 style="margin: 0 0 20px 0;">📈 Umumiy Ko'rsatkichlar</h2>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                <div style="background: #f0fdf4; padding: 20px; border-radius: 12px;">
                    <div style="font-size: 14px; color: #6b7280; margin-bottom: 8px;">O'rtacha chek</div>
                    <div style="font-size: 24px; font-weight: 900; color: #059669;" id="avgCheck">$0.00</div>
                </div>
                
                <div style="background: #fef3c7; padding: 20px; border-radius: 12px;">
                    <div style="font-size: 14px; color: #6b7280; margin-bottom: 8px;">Eng katta savdo</div>
                    <div style="font-size: 24px; font-weight: 900; color: #d97706;" id="maxSale">$0.00</div>
                </div>
                
                <div style="background: #f0f9ff; padding: 20px; border-radius: 12px;">
                    <div style="font-size: 14px; color: #6b7280; margin-bottom: 8px;">Mijozlar soni</div>
                    <div style="font-size: 24px; font-weight: 900; color: #1e40af;" id="customersCount">0</div>
                </div>
                
                <div style="background: #fce7f3; padding: 20px; border-radius: 12px;">
                    <div style="font-size: 14px; color: #6b7280; margin-bottom: 8px;">Berilgan kirim</div>
                    <div style="font-size: 24px; font-weight: 900; color: #be185d;" id="handedOver">$0.00</div>
                </div>
            </div>
        </div>
    </div>

    <script src="cashier-reports.js"></script>
    <script src="mobile-enhancements.js"></script>
</body>
</html>
