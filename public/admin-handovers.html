<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kirim Topshirishlar</title>
    <link rel="stylesheet" href="mobile-responsive.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #4facfe;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .filter-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .handovers-list {
            margin-top: 20px;
        }
        
        .handover-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .handover-card:hover {
            border-color: #4facfe;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.2);
        }
        
        .handover-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .handover-amount {
            font-size: 2em;
            color: #28a745;
            font-weight: 700;
        }
        
        .handover-date {
            color: #666;
            font-size: 14px;
        }
        
        .handover-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .info-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .info-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #4facfe;
            color: white;
        }
        
        .btn-primary:hover {
            background: #3a8fd9;
        }
    </style>
  <script src="back-button.js"></script>
</head>
<body>
    <div class="container">
        <h1>💰 Kirim Topshirishlar</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalHandovers">0</div>
                <div class="stat-label">Jami Kirimlar</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAmount">$0</div>
                <div class="stat-label">Jami Summa</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayHandovers">0</div>
                <div class="stat-label">Bugungi Kirimlar</div>
            </div>
        </div>
        
        <div class="filter-section">
            <label style="margin: 0;">Kassir bo'yicha filter:</label>
            <select id="filterCashier" onchange="filterHandovers()">
                <option value="">Barcha kassirlar</option>
            </select>
            <a href="admin-cashiers.html" class="btn btn-primary">⬅ Kassirlar ro'yxatiga qaytish</a>
        </div>
        
        <div class="handovers-list" id="handoversList"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let allHandovers = [];
        let allCashiers = [];
        
        async function loadCashiers() {
            try {
                const response = await fetch(`${API_URL}/cashiers`);
                const data = await response.json();
                
                if (data.success) {
                    allCashiers = data.cashiers;
                    
                    const filterSelect = document.getElementById('filterCashier');
                    filterSelect.innerHTML = '<option value="">Barcha kassirlar</option>' +
                        allCashiers.map(c => `<option value="${c.cashierId}">${c.name}</option>`).join('');
                    
                    // URL dan kassir ID ni olish
                    const urlParams = new URLSearchParams(window.location.search);
                    const cashierId = urlParams.get('cashierId');
                    if (cashierId) {
                        filterSelect.value = cashierId;
                    }
                }
            } catch (error) {
                console.error('Xato:', error);
            }
        }
        
        async function loadHandovers() {
            try {
                const response = await fetch(`${API_URL}/all-handovers`);
                const data = await response.json();
                
                if (data.success) {
                    allHandovers = data.handovers;
                    filterHandovers();
                }
            } catch (error) {
                console.error('Xato:', error);
                alert('Kirimlarni yuklashda xato!');
            }
        }
        
        function filterHandovers() {
            const cashierId = document.getElementById('filterCashier').value;
            
            let filtered = allHandovers;
            if (cashierId) {
                filtered = allHandovers.filter(h => h.cashierId == cashierId);
            }
            
            displayHandovers(filtered);
            updateStats(filtered);
        }
        
        function displayHandovers(handovers) {
            const container = document.getElementById('handoversList');
            
            if (handovers.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">Hozircha kirimlar yo\'q</p>';
                return;
            }
            
            container.innerHTML = handovers.map(handover => `
                <div class="handover-card">
                    <div class="handover-header">
                        <div>
                            <div class="handover-amount">$${handover.amount.toFixed(2)}</div>
                            <div class="handover-date">${handover.date} ${handover.time}</div>
                        </div>
                    </div>
                    <div class="handover-info">
                        <div class="info-item">
                            <div class="info-label">Kirim ID</div>
                            <div class="info-value">#${handover.handoverId}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Kassir</div>
                            <div class="info-value">${handover.cashierName}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Oldingi Balans</div>
                            <div class="info-value">$${handover.balanceBefore?.toFixed(2) || '0.00'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Keyingi Balans</div>
                            <div class="info-value">$${handover.balanceAfter?.toFixed(2) || '0.00'}</div>
                        </div>
                        ${handover.notes ? `
                        <div class="info-item" style="grid-column: 1 / -1;">
                            <div class="info-label">Izoh</div>
                            <div class="info-value">${handover.notes}</div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function updateStats(handovers) {
            document.getElementById('totalHandovers').textContent = handovers.length;
            
            const totalAmount = handovers.reduce((sum, h) => sum + h.amount, 0);
            document.getElementById('totalAmount').textContent = '$' + totalAmount.toFixed(2);
            
            const today = new Date().toLocaleDateString('uz-UZ');
            const todayHandovers = handovers.filter(h => h.date === today);
            document.getElementById('todayHandovers').textContent = todayHandovers.length;
        }
        
        // Sahifa yuklanganda
        loadCashiers();
        loadHandovers();
    </script>
    <script src="mobile-enhancements.js"></script>
</body>
</html>
