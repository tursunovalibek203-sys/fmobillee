<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Products API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-section {
            background: #f5f5f5;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #5568d3;
        }
        pre {
            background: white;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .product-item {
            background: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
    </style>
  <script src="back-button.js"></script>
    <link rel="stylesheet" href="/mobile-responsive-complete.css">
</head>
<body>
    <h1>🧪 Products API Test</h1>

    <div class="test-section">
        <h2>Test 1: Barcha Mahsulotlar</h2>
        <button onclick="testAllProducts()">Test All Products</button>
        <div id="result1"></div>
    </div>

    <div class="test-section">
        <h2>Test 2: Filial 1 Mahsulotlari</h2>
        <button onclick="testBranch1()">Test Branch 1</button>
        <div id="result2"></div>
    </div>

    <div class="test-section">
        <h2>Test 3: Filial 2 Mahsulotlari</h2>
        <button onclick="testBranch2()">Test Branch 2</button>
        <div id="result3"></div>
    </div>

    <div class="test-section">
        <h2>Test 4: Mahsulot Qo'shish</h2>
        <input type="text" id="productName" placeholder="Mahsulot nomi" style="padding: 10px; width: 200px;">
        <input type="number" id="productPrice" placeholder="Narx" style="padding: 10px; width: 100px;">
        <input type="number" id="productStock" placeholder="Ombor" style="padding: 10px; width: 100px;">
        <button onclick="addProduct()">Qo'shish</button>
        <div id="result4"></div>
    </div>

    <script>
        async function testAllProducts() {
            const result = document.getElementById('result1');
            result.innerHTML = '<p>Yuklanmoqda...</p>';
            
            try {
                const response = await fetch('/api/products');
                const data = await response.json();
                
                console.log('All products:', data);
                
                if (Array.isArray(data)) {
                    result.innerHTML = `
                        <p><strong>Jami: ${data.length} ta mahsulot</strong></p>
                        ${data.map(p => `
                            <div class="product-item">
                                <strong>${p.name}</strong> - 
                                $${p.sellPrice} - 
                                Ombor: ${p.stock} - 
                                ${p.branchId ? 'Filial: ' + p.branchId : 'Umumiy'}
                            </div>
                        `).join('')}
                    `;
                } else {
                    result.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (error) {
                result.innerHTML = '<p style="color: red;">Xato: ' + error.message + '</p>';
            }
        }

        async function testBranch1() {
            const result = document.getElementById('result2');
            result.innerHTML = '<p>Yuklanmoqda...</p>';
            
            try {
                const response = await fetch('/api/products?branchId=1');
                const data = await response.json();
                
                console.log('Branch 1 products:', data);
                
                if (Array.isArray(data)) {
                    result.innerHTML = `
                        <p><strong>Filial 1: ${data.length} ta mahsulot</strong></p>
                        ${data.map(p => `
                            <div class="product-item">
                                <strong>${p.name}</strong> - 
                                $${p.sellPrice} - 
                                Ombor: ${p.stock}
                            </div>
                        `).join('')}
                    `;
                } else {
                    result.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (error) {
                result.innerHTML = '<p style="color: red;">Xato: ' + error.message + '</p>';
            }
        }

        async function testBranch2() {
            const result = document.getElementById('result3');
            result.innerHTML = '<p>Yuklanmoqda...</p>';
            
            try {
                const response = await fetch('/api/products?branchId=2');
                const data = await response.json();
                
                console.log('Branch 2 products:', data);
                
                if (Array.isArray(data)) {
                    result.innerHTML = `
                        <p><strong>Filial 2: ${data.length} ta mahsulot</strong></p>
                        ${data.map(p => `
                            <div class="product-item">
                                <strong>${p.name}</strong> - 
                                $${p.sellPrice} - 
                                Ombor: ${p.stock}
                            </div>
                        `).join('')}
                    `;
                } else {
                    result.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (error) {
                result.innerHTML = '<p style="color: red;">Xato: ' + error.message + '</p>';
            }
        }

        async function addProduct() {
            const result = document.getElementById('result4');
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const stock = document.getElementById('productStock').value;
            
            if (!name || !price || !stock) {
                alert('Barcha maydonlarni to\'ldiring!');
                return;
            }
            
            result.innerHTML = '<p>Qo\'shilmoqda...</p>';
            
            try {
                const response = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        sellPrice: parseFloat(price),
                        stock: parseInt(stock),
                        category: 'Test',
                        buyPrice: 0,
                        minStock: 5,
                        unit: 'dona'
                    })
                });
                
                const data = await response.json();
                
                console.log('Add product result:', data);
                
                if (data.success) {
                    result.innerHTML = '<p style="color: green;">✅ Mahsulot qo\'shildi!</p>';
                    document.getElementById('productName').value = '';
                    document.getElementById('productPrice').value = '';
                    document.getElementById('productStock').value = '';
                    
                    // Refresh all products
                    testAllProducts();
                } else {
                    result.innerHTML = '<p style="color: red;">❌ Xato: ' + data.error + '</p>';
                }
            } catch (error) {
                result.innerHTML = '<p style="color: red;">Xato: ' + error.message + '</p>';
            }
        }

        // Auto-load on page load
        window.addEventListener('load', () => {
            testAllProducts();
        });
    </script>
    <script src="/mobile-enhancements-complete.js"></script>
</body>
</html>
