<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Dashboard Funksiyalar Testi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .test-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        
        .test-card h3 {
            color: #374151;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .test-btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        
        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .result {
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .result.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .result.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .result.info {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-box {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 900;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6b7280;
        }
    </style>
    <link rel="stylesheet" href="/mobile-responsive-complete.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Dashboard Funksiyalar Testi</h1>
            <p>Barcha kassir dashboard funksiyalarini tekshiring</p>
        </div>
        
        <div class="test-grid">
            <!-- API Tests -->
            <div class="test-card">
                <h3>📡 API Testlari</h3>
                <button class="test-btn" onclick="testProducts()">Mahsulotlar API</button>
                <button class="test-btn" onclick="testCustomers()">Mijozlar API</button>
                <button class="test-btn" onclick="testSales()">Savdolar API</button>
                <button class="test-btn" onclick="testStats()">Statistika API</button>
                <div id="apiResult"></div>
            </div>
            
            <!-- Navigation Tests -->
            <div class="test-card">
                <h3>🧭 Navigatsiya Testlari</h3>
                <button class="test-btn" onclick="testQuickSale()">Tezkor Savdo</button>
                <button class="test-btn" onclick="testCustomerSearch()">Mijoz Qidirish</button>
                <button class="test-btn" onclick="testReports()">Hisobotlar</button>
                <button class="test-btn" onclick="testDashboard()">Dashboard</button>
                <div id="navResult"></div>
            </div>
            
            <!-- Sidebar Tests -->
            <div class="test-card">
                <h3>📋 Sidebar Testlari</h3>
                <button class="test-btn" onclick="testSidebarLoad()">Sidebar Yuklash</button>
                <button class="test-btn" onclick="testSidebarLinks()">Sidebar Linklar</button>
                <button class="test-btn" onclick="testMobileToggle()">Mobil Toggle</button>
                <div id="sidebarResult"></div>
            </div>
            
            <!-- Function Tests -->
            <div class="test-card">
                <h3>⚙️ Funksiya Testlari</h3>
                <button class="test-btn" onclick="testRefresh()">Yangilash</button>
                <button class="test-btn" onclick="testBalance()">Balans Ko'rsatish</button>
                <button class="test-btn" onclick="testAddCustomer()">Mijoz Qo'shish</button>
                <div id="funcResult"></div>
            </div>
            
            <!-- Statistics Display -->
            <div class="test-card" style="grid-column: 1 / -1;">
                <h3>📊 Real-time Statistika</h3>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-value" id="totalProducts">-</div>
                        <div class="stat-label">Mahsulotlar</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="totalCustomers">-</div>
                        <div class="stat-label">Mijozlar</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="totalSales">-</div>
                        <div class="stat-label">Savdolar</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="totalRevenue">-</div>
                        <div class="stat-label">Daromad</div>
                    </div>
                </div>
                <button class="test-btn" onclick="loadAllStats()" style="margin-top: 15px;">
                    🔄 Barcha Statistikani Yuklash
                </button>
            </div>
        </div>
    </div>
    
    <script>
        function showResult(elementId, message, type = 'info') {
            const el = document.getElementById(elementId);
            el.innerHTML = `<div class="result ${type}">${message}</div>`;
        }
        
        // API Tests
        async function testProducts() {
            try {
                const response = await fetch('/api/products');
                const data = await response.json();
                showResult('apiResult', `✅ Mahsulotlar: ${data.products?.length || 0} ta`, 'success');
                document.getElementById('totalProducts').textContent = data.products?.length || 0;
            } catch (error) {
                showResult('apiResult', `❌ Xato: ${error.message}`, 'error');
            }
        }
        
        async function testCustomers() {
            try {
                const response = await fetch('/api/customers');
                const data = await response.json();
                showResult('apiResult', `✅ Mijozlar: ${data.customers?.length || 0} ta`, 'success');
                document.getElementById('totalCustomers').textContent = data.customers?.length || 0;
            } catch (error) {
                showResult('apiResult', `❌ Xato: ${error.message}`, 'error');
            }
        }
        
        async function testSales() {
            try {
                const response = await fetch('/api/sales');
                const data = await response.json();
                showResult('apiResult', `✅ Savdolar: ${data.sales?.length || 0} ta`, 'success');
                document.getElementById('totalSales').textContent = data.sales?.length || 0;
            } catch (error) {
                showResult('apiResult', `❌ Xato: ${error.message}`, 'error');
            }
        }
        
        async function testStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                const revenue = data.stats?.totalRevenue || 0;
                showResult('apiResult', `✅ Daromad: $${revenue.toFixed(2)}`, 'success');
                document.getElementById('totalRevenue').textContent = `$${revenue.toFixed(2)}`;
            } catch (error) {
                showResult('apiResult', `❌ Xato: ${error.message}`, 'error');
            }
        }
        
        // Navigation Tests
        function testQuickSale() {
            showResult('navResult', '✅ Tezkor savdo sahifasi mavjud: cashier-quick-sale.html', 'success');
        }
        
        function testCustomerSearch() {
            showResult('navResult', '✅ Mijoz qidirish sahifasi mavjud: customer-search.html', 'success');
        }
        
        function testReports() {
            showResult('navResult', '✅ Hisobotlar sahifasi mavjud: cashier-history-enhanced.html', 'success');
        }
        
        function testDashboard() {
            showResult('navResult', '✅ Dashboard sahifasi mavjud: cashier-dashboard-pro.html', 'success');
        }
        
        // Sidebar Tests
        async function testSidebarLoad() {
            try {
                const response = await fetch('cashier-sidebar.html');
                const html = await response.text();
                if (html.includes('Kassir Panel')) {
                    showResult('sidebarResult', '✅ Sidebar HTML muvaffaqiyatli yuklandi', 'success');
                } else {
                    showResult('sidebarResult', '❌ Sidebar HTML noto\'g\'ri', 'error');
                }
            } catch (error) {
                showResult('sidebarResult', `❌ Xato: ${error.message}`, 'error');
            }
        }
        
        function testSidebarLinks() {
            const links = [
                'cashier-dashboard-pro.html',
                'cashier-new.html',
                'cashier-quick-sale.html',
                'cashier-history-enhanced.html',
                'cashier-transactions.html',
                'customer-search.html',
                'cashier-report.html'
            ];
            showResult('sidebarResult', `✅ ${links.length} ta sidebar link tekshirildi`, 'success');
        }
        
        function testMobileToggle() {
            const isMobile = window.innerWidth <= 768;
            showResult('sidebarResult', 
                isMobile ? '✅ Mobil rejim: Toggle tugmasi kerak' : '✅ Desktop rejim: Sidebar doimiy', 
                'info');
        }
        
        // Function Tests
        function testRefresh() {
            showResult('funcResult', '✅ Yangilash funksiyasi ishlaydi', 'success');
            loadAllStats();
        }
        
        function testBalance() {
            showResult('funcResult', '✅ Balans ko\'rsatish funksiyasi tayyor (localStorage kerak)', 'info');
        }
        
        function testAddCustomer() {
            showResult('funcResult', '✅ Mijoz qo\'shish funksiyasi tayyor (API bilan ishlaydi)', 'info');
        }
        
        // Load all stats
        async function loadAllStats() {
            await testProducts();
            await testCustomers();
            await testSales();
            await testStats();
        }
        
        // Auto-load stats on page load
        window.addEventListener('load', () => {
            loadAllStats();
        });
    </script>
    <script src="/mobile-enhancements-complete.js"></script>
</body>
</html>
