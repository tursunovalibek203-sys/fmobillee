<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔔 Bildirishnomalar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin: 5px 0;
        }

        .stat-card .label {
            color: #666;
            font-size: 14px;
        }

        .filters {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filters select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .notifications-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .notification {
            padding: 15px;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
            border-radius: 8px;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s;
        }

        .notification:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .notification.unread {
            background: #e3f2fd;
            border-left-color: #2196F3;
        }

        .notification.warning {
            border-left-color: #ff9800;
        }

        .notification.error {
            border-left-color: #f44336;
        }

        .notification.success {
            border-left-color: #4caf50;
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .notification-title {
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }

        .notification-time {
            font-size: 12px;
            color: #999;
        }

        .notification-message {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .notification-actions {
            display: flex;
            gap: 10px;
        }

        .notification-actions button {
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .btn-read {
            background: #4caf50;
            color: white;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-action {
            background: #2196F3;
            color: white;
        }

        .priority-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 10px;
        }

        .priority-urgent {
            background: #f44336;
            color: white;
        }

        .priority-high {
            background: #ff9800;
            color: white;
        }

        .priority-normal {
            background: #2196F3;
            color: white;
        }

        .priority-low {
            background: #9e9e9e;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
    
        /* Sidebar Styles */
        .menu-item:hover {
            background: #f3f4f6 !important;
            color: #667eea !important;
        }
        
        .menu-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2) !important;
            color: white !important;
        }
        
        .logout-btn:hover {
            background: #dc2626 !important;
        }
        
        /* Main Content Wrapper */
        body {
            display: flex !important;
        }
        
        body > .container,
        body > .dashboard,
        body > div:not(.admin-sidebar):not(.sidebar-overlay):not(.mobile-menu-btn) {
            margin-left: 280px !important;
            flex: 1 !important;
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            .admin-sidebar {
                transform: translateX(-100%) !important;
            }
            
            .admin-sidebar.active {
                transform: translateX(0) !important;
            }
            
            body > .container,
            body > .dashboard,
            body > div:not(.admin-sidebar):not(.sidebar-overlay):not(.mobile-menu-btn) {
                margin-left: 0 !important;
            }
            
            .mobile-menu-btn {
                display: block !important;
            }
            
            .sidebar-overlay.active {
                display: block !important;
            }
        }

    </style>

    <div class="container">
        <div class="header">
            <h1>🔔 Bildirishnomalar</h1>
            <div class="header-actions">
                <button class="btn" onclick="loadNotifications()">🔄 Yangilash</button>
                <button class="btn" onclick="markAllAsRead()">✅ Barchasini O'qilgan</button>
                <button class="btn btn-secondary" onclick="window.location.href='admin-dashboard.html'">🏠 Bosh Sahifa</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">📊</div>
                <div class="value" id="totalNotifications">0</div>
                <div class="label">Jami</div>
            </div>
            <div class="stat-card">
                <div class="icon">🔔</div>
                <div class="value" id="unreadNotifications">0</div>
                <div class="label">O'qilmagan</div>
            </div>
            <div class="stat-card">
                <div class="icon">✅</div>
                <div class="value" id="readNotifications">0</div>
                <div class="label">O'qilgan</div>
            </div>
            <div class="stat-card">
                <div class="icon">⚠️</div>
                <div class="value" id="urgentNotifications">0</div>
                <div class="label">Shoshilinch</div>
            </div>
        </div>

        <div class="filters">
            <select id="filterType" onchange="loadNotifications()">
                <option value="">Barcha Turlar</option>
                <option value="stock">📦 Ombor</option>
                <option value="cashier">💰 Kassa</option>
                <option value="customer">👥 Mijozlar</option>
                <option value="sale">🛒 Savdolar</option>
                <option value="system">⚙️ Tizim</option>
            </select>

            <select id="filterCategory" onchange="loadNotifications()">
                <option value="">Barcha Kategoriyalar</option>
                <option value="warning">⚠️ Ogohlantirish</option>
                <option value="error">❌ Xato</option>
                <option value="success">✅ Muvaffaqiyat</option>
                <option value="info">ℹ️ Ma'lumot</option>
            </select>

            <select id="filterRead" onchange="loadNotifications()">
                <option value="">Barchasi</option>
                <option value="false">O'qilmagan</option>
                <option value="true">O'qilgan</option>
            </select>
        </div>

        <div class="notifications-container">
            <div id="notificationsList"></div>
        </div>
    </div>

    <script src="admin-notifications-new.js"></script>
    <script src="/mobile-enhancements-complete.js"></script>

    <script>
        // Toggle Sidebar (Mobile)
        function toggleSidebar() {
            document.querySelector('.admin-sidebar').classList.toggle('active');
            document.querySelector('.sidebar-overlay').classList.toggle('active');
        }
        
        // Logout
        function logout() {
            if (confirm('Tizimdan chiqmoqchimisiz?')) {
                localStorage.removeItem('adminData');
                localStorage.removeItem('adminToken');
                window.location.href = 'index.html';
            }
        }
        
        // Set active menu item
        document.addEventListener('DOMContentLoaded', () => {
            const currentPage = window.location.pathname.split('/').pop();
            document.querySelectorAll('.menu-item').forEach(item => {
                if (item.getAttribute('href') === currentPage) {
                    item.classList.add('active');
                }
            });
        });
    </script>
