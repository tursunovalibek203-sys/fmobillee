<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📱 Mahsulot IMEI Kodlari</title>
    <link rel="stylesheet" href="mobile-responsive.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(16, 185, 129, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(5, 150, 105, 0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    
    .header {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(16, 185, 129, 0.2);
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      color: #047857;
      font-size: 2em;
      font-weight: 800;
    }
    
    .product-info-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(16, 185, 129, 0.15);
      margin-bottom: 20px;
    }
    
    .product-name {
      font-size: 1.5em;
      font-weight: 800;
      color: #047857;
      margin-bottom: 16px;
    }
    
    .product-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    
    .stat-item {
      background: #f0fdf4;
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid #10b981;
    }
    
    .stat-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #047857;
    }
    
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    
    .item-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1);
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.2);
      border-color: #10b981;
    }
    
    .item-card.available {
      border-left: 4px solid #10b981;
    }
