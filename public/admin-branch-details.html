<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filial Batafsil</title>
    <link rel="stylesheet" href="mobile-responsive.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .branch-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
        }
        
        .branch-status {
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
        }
        
        .status-active {
            background: #d4edda;
            color: #155724;
        }
        
        .branch-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .info-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .info-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .info-value {
            font-size: 18px;
            color: #333;
            font-weight: 600;
            word-break: break-word;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
        }
        
        .section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            border-radius: 10px;
        }
        
        .table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;
            white-space: nowrap;
        }
        
        .table td {
            padding: 15px;
            border-bottom: 1px solid #dee2e6;
            vertical-align: middle;
        }
        
        .table tr:hover {
            background: #f8f9fa;
        }
        
        .table tr:last-child td {
            border-bottom: none;
        }
        
        .badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }
        
        .chart-container {
            height: 300px;
            margin-top: 20px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        /* 📱 RESPONSIVE DESIGN */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .branch-title {
                flex-direction: column;
                gap: 15px;
            }
            
            .branch-info {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .section {
                padding: 20px;
            }
            
            .section-title {
                font-size: 1.4em;
            }
            
            .table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
            
            .table th,
            .table td {
                padding: 10px;
                font-size: 14px;
            }
        }
        
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .stat-value {
                font-size: 2em;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="back-button.js"></script>

  <!-- 📱 Mobile Responsive CSS -->
  <link rel="stylesheet" href="mobile-universal.css">
  <link rel="stylesheet" href="mobile-admin-branches.css">
  <script src="mobile-enhancements.js"></script>
</head>
<body>
    <div class="container">
        <a href="admin-branches.html" class="back-btn">⬅ Filiallar ro'yxatiga qaytish</a>
        
        <div class="header">
            <div class="branch-title">
                <div>
                    <h1 id="branchName">Yuklanmoqda...</h1>
                    <div class="branch-info" id="branchInfo"></div>
                </div>
                <div class="branch-status status-active" id="branchStatus">Faol</div>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="totalCashiers">0</div>
                <div class="stat-label">Kassirlar</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="totalBalance">$0</div>
                <div class="stat-label">Jami Balans</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="totalSales">0</div>
                <div class="stat-label">Jami Savdolar</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💵</div>
                <div class="stat-value" id="totalRevenue">$0</div>
                <div class="stat-label">Jami Daromad</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">
                <span>👤</span>
                <span>Filial Kassirlari</span>
            </div>
            <div id="cashiersTable"></div>
        </div>
        
        <div class="section">
            <div class="section-title">
                <span>📊</span>
                <span>So'nggi Savdolar</span>
            </div>
            <div id="salesTable"></div>
        </div>
        
        <div class="section">
            <div class="section-title">
                <span>📈</span>
                <span>Savdolar Grafigi</span>
            </div>
            <div class="chart-container">
                <canvas id="salesChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let branchId = null;
        let branch = null;
        
        // URL dan filial ID ni olish
        const urlParams = new URLSearchParams(window.location.search);
        branchId = urlParams.get('branchId') || urlParams.get('id');  // ✅ Ikkala parametrni ham qo'llab-quvvatlash
        
        if (!branchId) {
            console.error('Filial ID topilmadi! URL:', window.location.href);
            alert('Filial ID topilmadi! Iltimos, filiallar ro\'yxatidan qayta tanlang.');
            setTimeout(() => {
                window.location.href = 'admin-branches.html';
            }, 2000);
            return;  // ✅ Funksiyani to'xtatish
        }
        
        let isFirstLoad = true;  // ✅ Birinchi yuklash belgisi
        
        async function loadBranchDetails() {
            try {
                // Filial ma'lumotlarini olish
                const branchRes = await fetch(`${API_URL}/branches`);
                const branchData = await branchRes.json();
                
                if (branchData.success) {
                    const foundBranch = branchData.branches.find(b => b.branchId == branchId);
                    
                    if (!foundBranch) {
                        // ✅ Faqat birinchi yuklashda redirect qilish
                        if (isFirstLoad) {
                            console.error('Filial topilmadi:', branchId);
                            alert('Filial topilmadi!');
                            window.location.href = 'admin-branches.html';
                        }
                        return;
                    }
                    
                    branch = foundBranch;
                    displayBranchInfo(branch);
                }
                
                // Kassirlarni olish
                const cashiersRes = await fetch(`${API_URL}/cashiers`);
                const cashiersData = await cashiersRes.json();
                
                if (cashiersData.success) {
                    const branchCashiers = cashiersData.cashiers.filter(c => c.branchId == branchId);
                    displayCashiers(branchCashiers);
                    updateCashierStats(branchCashiers);
                }
                
                // Savdolarni olish
                const salesRes = await fetch(`${API_URL}/all-cashier-sales`);
                const salesData = await salesRes.json();
                
                if (salesData.success) {
                    const branchSales = salesData.sales.filter(s => s.branchId == branchId);
                    displaySales(branchSales);
                    updateSalesStats(branchSales);
                    createSalesChart(branchSales);
                }
                
                isFirstLoad = false;  // ✅ Birinchi yuklash tugadi
                
            } catch (error) {
                console.error('Xato:', error);
                // ✅ Faqat birinchi yuklashda alert ko'rsatish
                if (isFirstLoad) {
                    alert('Ma\'lumotlarni yuklashda xato!');
                }
            }
        }
        
        function displayBranchInfo(branch) {
            document.getElementById('branchName').textContent = branch.name;
            document.getElementById('branchStatus').textContent = branch.isActive ? 'Faol' : 'Faolsiz';
            document.getElementById('branchStatus').className = 
                'branch-status ' + (branch.isActive ? 'status-active' : 'status-inactive');
            
            document.getElementById('branchInfo').innerHTML = `
                <div class="info-card">
                    <div class="info-label">ID</div>
                    <div class="info-value">#${branch.branchId}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Manzil</div>
                    <div class="info-value">${branch.address || 'Kiritilmagan'}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Telefon</div>
                    <div class="info-value">${branch.phone || 'Kiritilmagan'}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Menejer</div>
                    <div class="info-value">${branch.manager || 'Kiritilmagan'}</div>
                </div>
            `;
        }
        
        function displayCashiers(cashiers) {
            const container = document.getElementById('cashiersTable');
            
            if (cashiers.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👤</div>
                        <p>Bu filialda hozircha kassirlar yo'q</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Ism</th>
                            <th>Login</th>
                            <th>Telefon</th>
                            <th>Balans</th>
                            <th>Jami Savdolar</th>
                            <th>Holat</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${cashiers.map(c => `
                            <tr>
                                <td>#${c.cashierId}</td>
                                <td>${c.name}</td>
                                <td>${c.username}</td>
                                <td>${c.phone || '-'}</td>
                                <td>$${c.balance?.toFixed(2) || '0.00'}</td>
                                <td>$${c.totalSales?.toFixed(2) || '0.00'}</td>
                                <td>
                                    <span class="badge ${c.isActive ? 'badge-success' : 'badge-danger'}">
                                        ${c.isActive ? 'Faol' : 'Faolsiz'}
                                    </span>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function displaySales(sales) {
            const container = document.getElementById('salesTable');
            
            if (sales.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <p>Bu filialda hozircha savdolar yo'q</p>
                    </div>
                `;
                return;
            }
            
            // Faqat oxirgi 10 ta savdoni ko'rsatish
            const recentSales = sales.slice(0, 10);
            
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Sana</th>
                            <th>Vaqt</th>
                            <th>Kassir</th>
                            <th>Mijoz</th>
                            <th>Mahsulot</th>
                            <th>Narx</th>
                            <th>To'landi</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${recentSales.map(s => `
                            <tr>
                                <td>#${s.saleId}</td>
                                <td>${s.date}</td>
                                <td>${s.time}</td>
                                <td>${s.cashierName}</td>
                                <td>${s.customerName || '-'}</td>
                                <td>${s.product}</td>
                                <td>$${s.price?.toFixed(2)}</td>
                                <td>$${s.paidUSD?.toFixed(2) || '0.00'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        function updateCashierStats(cashiers) {
            document.getElementById('totalCashiers').textContent = cashiers.length;
            
            const totalBalance = cashiers.reduce((sum, c) => sum + (c.balance || 0), 0);
            document.getElementById('totalBalance').textContent = '$' + totalBalance.toFixed(2);
        }
        
        function updateSalesStats(sales) {
            document.getElementById('totalSales').textContent = sales.length;
            
            const totalRevenue = sales.reduce((sum, s) => sum + (s.price || 0), 0);
            document.getElementById('totalRevenue').textContent = '$' + totalRevenue.toFixed(2);
        }
        
        function createSalesChart(sales) {
            // Oxirgi 7 kunlik savdolar
            const last7Days = [];
            const today = new Date();
            
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                last7Days.push(date.toLocaleDateString('uz-UZ'));
            }
            
            const salesByDay = last7Days.map(day => {
                return sales.filter(s => s.date === day).length;
            });
            
            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last7Days,
                    datasets: [{
                        label: 'Savdolar soni',
                        data: salesByDay,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        }
        
        // Scroll position ni saqlash
        let savedScrollPosition = 0;
        
        // Yangilashdan oldin scroll position ni saqlash
        function saveScrollPosition() {
            savedScrollPosition = window.pageYOffset || document.documentElement.scrollTop;
        }
        
        // Yangilashdan keyin scroll position ni tiklash
        function restoreScrollPosition() {
            window.scrollTo(0, savedScrollPosition);
        }
        
        // loadBranchDetails ni o'zgartirish
        async function loadBranchDetailsWithScroll() {
            saveScrollPosition();  // ✅ Scroll ni saqlash
            await loadBranchDetails();
            setTimeout(restoreScrollPosition, 100);  // ✅ Scroll ni tiklash
        }
        
        // Sahifa yuklanganda
        loadBranchDetails();
        
        // Har 30 sekundda yangilash (scroll bilan)
        setInterval(loadBranchDetailsWithScroll, 30000);
    </script>
    <script src="mobile-enhancements.js"></script>
</body>
</html>
