<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Do'kon Boshqaruv</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 20%, #1d4ed8 40%, #1e40af 60%, #1e3a8a 80%, #1e3a8a 100%) !important;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(96, 165, 250, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(37, 99, 235, 0.2) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(37, 99, 235, 0.15);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        .header h1 {
            color: #1e3a8a;
            font-size: 2em;
            font-weight: 800;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(37, 99, 235, 0.15);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 48px rgba(37, 99, 235, 0.22);
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .stat-label {
            color: #6b7280;
            font-size: 1.1em;
            font-weight: 600;
        }
        
        .section {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(37, 99, 235, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 20px;
        }
        
        .section h3 {
            color: #1e3a8a;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 800;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95em;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
            margin: 5px;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981, #047857);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }
        
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f9fafb;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #2563eb;
            transition: all 0.2s;
        }
        
        .file-item:hover {
            transform: translateX(4px);
            background: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }
        
        .file-name {
            font-weight: 600;
            color: #1e3a8a;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            
            .header {
                padding: 16px;
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            
            .header h1 {
                font-size: 1.5em;
            }
            
            .header > div {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .btn {
                flex: 1;
                min-width: calc(50% - 4px);
                padding: 10px 16px;
                font-size: 0.85em;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            
            .stat-card {
                padding: 16px;
            }
            
            .stat-number {
                font-size: 2em;
            }
            
            .stat-label {
                font-size: 0.95em;
            }
            
            .section {
                padding: 16px;
            }
            
            .section h3 {
                font-size: 1.1em;
            }
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.3em;
            }
            
            .stat-number {
                font-size: 1.8em;
            }
            
            .btn {
                width: 100%;
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Admin Dashboard</h1>
            <div>
                <a href="/" class="btn btn-primary">🏠 Asosiy Sahifa</a>
                <button class="btn btn-success" onclick="location.reload()">🔄 Yangilash</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalCustomers">-</div>
                <div class="stat-label">Jami Mijozlar</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalSales">-</div>
                <div class="stat-label">Jami Savdolar</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalDebt">-</div>
                <div class="stat-label">Jami Qarz</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todaySales">-</div>
                <div class="stat-label">Bugungi Savdolar</div>
            </div>
        </div>
        
        <div class="section">
            <h3>💾 Backup & Export</h3>
            <button class="btn btn-success" onclick="createBackup()">📦 Backup Yaratish</button>
            <button class="btn btn-primary" onclick="exportExcel()">📊 Excel Ko'rish</button>
        </div>
        
        <div class="section">
            <h3>📊 Tizim Ma'lumotlari</h3>
            <p style="color: #6b7280; line-height: 1.8;">
                <strong>Versiya:</strong> 2.3<br>
                <strong>Valyuta:</strong> Dollar (USD)<br>
                <strong>Til:</strong> O'zbekcha<br>
                <strong>Dizayn:</strong> Professional Ko'k
            </p>
        </div>
    </div>
    
    <script>
        // Login tekshiruvi
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = '/login.html';
        }
        
        // Chiqish funksiyasi
        function logout() {
            if (confirm('Tizimdan chiqmoqchimisiz?')) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('loginTime');
                window.location.href = '/login.html';
            }
        }
        
        // Statistikani yuklash
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalCustomers').textContent = data.stats.totalCustomers;
                    document.getElementById('totalSales').textContent = data.stats.totalSales;
                    document.getElementById('totalDebt').textContent = '$' + data.stats.totalDebt.toLocaleString('en-US', {minimumFractionDigits: 2});
                    document.getElementById('todaySales').textContent = data.stats.todaySales;
                }
            } catch (error) {
                console.error('Statistika yuklashda xato:', error);
                alert('❌ Statistika yuklashda xatolik!\n\nServer ishlamayotgan bo\'lishi mumkin.');
            }
        }
        
        // Backup yaratish
        async function createBackup() {
            if (!confirm('💾 Backup yaratilsinmi?')) return;
            
            try {
                const response = await fetch('/api/backup/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`✅ Backup yaratildi!\n\n📁 ${data.fileName}\n📏 ${(data.size / 1024).toFixed(2)} KB`);
                    location.reload();
                } else {
                    alert('❌ Backup yaratishda xatolik!');
                }
            } catch (error) {
                console.error('Backup xatosi:', error);
                alert('❌ Server bilan aloqa yo\'q!');
            }
        }
        
        // Excel export
        async function exportExcel() {
            if (!confirm('📊 Excel export qilinsinmi?')) return;
            
            try {
                const response = await fetch('/api/excel-files');
                const data = await response.json();
                
                if (data.success && data.files.length > 0) {
                    let fileList = '📊 Mavjud Excel fayllar:\n\n';
                    data.files.forEach((file, index) => {
                        fileList += `${index + 1}. ${file.name}\n`;
                    });
                    alert(fileList + '\n\n💡 Fayllarni yuklab olish uchun:\n' + window.location.origin + '/api/excel-download/FAYL_NOMI');
                } else {
                    alert('📊 Hozircha Excel fayllar yo\'q');
                }
            } catch (error) {
                console.error('Excel export xatosi:', error);
                alert('❌ Server bilan aloqa yo\'q!');
            }
        }
        
        // Sahifa yuklanganda
        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
